# CI de @milpa/design — el quality floor es inescapable (HANDOFF T3).
# Sin instalación: los verificadores son node puro, cero dependencias.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # npm test = triple gate:
      #   1. contraste WCAG AA (135 pares)
      #   2. gobernanza del molde (token-purity, contratos válidos y coherentes)
      #   3. drift: dist/ debe coincidir con lo que genera tokens/milpa-tokens.json
      #      (build-tokens.mjs --check — si editaste el JSON, corré npm run build)
      - run: npm test
